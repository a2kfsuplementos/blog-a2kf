<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin – A2KF Suplementos</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'DM Sans', sans-serif; background: #0A0A0A; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .login-box { background: #111; border: 2px solid #FFD400; padding: 3rem; width: 100%; max-width: 420px; }
    .logo { text-align: center; margin-bottom: 2rem; }
    .logo-badge { background: #FFD400; color: #000; font-family: 'Bebas Neue', sans-serif; font-size: 2.5rem; padding: 4px 20px; display: inline-block; }
    .logo-sub { color: #666; font-size: 11px; letter-spacing: 3px; text-transform: uppercase; margin-top: .5rem; }
    h2 { color: #fff; font-family: 'Bebas Neue', sans-serif; font-size: 2rem; letter-spacing: 1px; margin-bottom: 2rem; text-align: center; }
    label { display: block; color: #999; font-size: 12px; letter-spacing: 1px; text-transform: uppercase; margin-bottom: .5rem; }
    input { width: 100%; padding: 12px 16px; background: #1a1a1a; border: 1px solid #333; color: #fff; font-family: 'DM Sans', sans-serif; font-size: 15px; margin-bottom: 1.5rem; outline: none; transition: border-color .2s; }
    input:focus { border-color: #FFD400; }
    .btn { width: 100%; padding: 14px; background: #FFD400; color: #000; border: none; font-family: 'DM Sans', sans-serif; font-weight: 700; font-size: 14px; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; transition: opacity .2s; }
    .btn:hover { opacity: .9; }
    .btn:disabled { opacity: .5; cursor: not-allowed; }
    .error { background: #2a0000; border: 1px solid #ff4444; color: #ff8888; padding: 10px 14px; font-size: 13px; margin-bottom: 1rem; display: none; }
  </style>
</head>
<body>
<div class="login-box">
  <div class="logo">
    <div class="logo-badge">A2KF</div>
    <div class="logo-sub">Painel Administrativo</div>
  </div>
  <h2>ENTRAR</h2>
  <div class="error" id="errorMsg"></div>
  <label>Email</label>
  <input type="email" id="email" placeholder="seu@email.com" />
  <label>Senha</label>
  <input type="password" id="password" placeholder="••••••••" />
  <button class="btn" id="loginBtn" onclick="doLogin()">Acessar Painel</button>
</div>

<script>
  const SUPABASE_URL = 'https://lotyhojoixtqgxnqllac.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxvdHlob2pvaXh0cWd4bnFsbGFjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkyMzE0MzMsImV4cCI6MjA5NDgwNzQzM30.JerocygTqXc_hQOB1YBhWIC6aUd95GQO9uH5sC-U0_g';

  const _sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  _sb.auth.getSession().then(({ data: { session } }) => {
    if (session) window.location.href = 'dashboard.html';
  });

  async function doLogin() {
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const btn = document.getElementById('loginBtn');
    const err = document.getElementById('errorMsg');
    if (!email || !password) { showError('Preencha email e senha.'); return; }
    btn.disabled = true;
    btn.textContent = 'Entrando...';
    err.style.display = 'none';
    const { error } = await _sb.auth.signInWithPassword({ email, password });
    if (error) {
      showError('Email ou senha incorretos.');
      btn.disabled = false;
      btn.textContent = 'Acessar Painel';
    } else {
      window.location.href = 'dashboard.html';
    }
  }

  function showError(msg) {
    const err = document.getElementById('errorMsg');
    err.textContent = msg;
    err.style.display = 'block';
  }

  document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
</script>
</body>
</html>
