<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Confira dicas sobre suplementos, treinos, nutrição e resultados esportivos no blog da A2KF Suplementos.">
  <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/a2kfsuplementos/blog-a2kf/main/logo.png">
  <title>Blog A2KF Suplementos | Suplementos Para Quem Quer Resultados</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --yellow: #FFD400;
      --black: #0A0A0A;
      --white: #FFFFFF;
      --gray: #F4F4F2;
      --text-muted: #6B6B6B;
      --border: #E5E5E0;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'DM Sans', sans-serif; background: var(--white); color: var(--black); }

    /* NAV */
    nav {
      position: sticky; top: 0; z-index: 100;
      background: var(--black); border-bottom: 3px solid var(--yellow);
      padding: 0 2rem; display: flex; align-items: center; justify-content: space-between; height: 130px;
    }
    .nav-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
    .nav-logo-badge {
      background: var(--yellow); color: var(--black);
      font-family: 'Bebas Neue', sans-serif; font-size: 22px;
      padding: 2px 10px; letter-spacing: 1px;
    }
    .nav-logo-text { color: var(--white); font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; letter-spacing: 2px; text-transform: uppercase; }
    .nav-links { display: flex; gap: 2rem; align-items: center; }
    .nav-links a { color: #ccc; text-decoration: none; font-size: 14px; font-weight: 500; transition: color .2s; }
    .nav-links a:hover { color: var(--yellow); }
    .nav-admin-btn {
      background: var(--yellow); color: var(--black); border: none;
      font-family: 'DM Sans', sans-serif; font-weight: 700; font-size: 13px;
      padding: 8px 18px; cursor: pointer; text-decoration: none;
      letter-spacing: 1px; text-transform: uppercase;
    }

    /* HERO */
    .hero {
      background: var(--black); color: var(--white);
      padding: 5rem 2rem 4rem; text-align: center; position: relative; overflow: hidden;
    }
    .hero::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
      background: repeating-linear-gradient(90deg, transparent, transparent 59px, rgba(255,212,0,.04) 60px);
      pointer-events: none;
    }
    .hero-label {
      display: inline-block; background: var(--yellow); color: var(--black);
      font-size: 11px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase;
      padding: 4px 14px; margin-bottom: 1.5rem;
    }
    .hero h1 { font-family: 'Bebas Neue', sans-serif; font-size: clamp(3rem, 8vw, 7rem); line-height: .95; letter-spacing: 2px; }
    .hero h1 span { color: var(--yellow); }
    .hero p { margin-top: 1.5rem; color: #aaa; font-size: 1.1rem; max-width: 480px; margin-left: auto; margin-right: auto; }

    /* SEARCH */
    .search-bar {
      background: var(--gray); padding: 1.5rem 2rem; border-bottom: 1px solid var(--border);
      display: flex; justify-content: center;
    }
    .search-bar input {
      width: 100%; max-width: 560px; padding: 12px 20px;
      border: 2px solid var(--border); font-family: 'DM Sans', sans-serif; font-size: 15px;
      outline: none; background: var(--white); transition: border-color .2s;
    }
    .search-bar input:focus { border-color: var(--yellow); }

    /* CATEGORIES */
    .categories {
      padding: 1.5rem 2rem; border-bottom: 1px solid var(--border);
      display: flex; gap: .75rem; flex-wrap: wrap; justify-content: center;
    }
    .cat-btn {
      padding: 6px 18px; border: 1.5px solid var(--border);
      background: var(--white); font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500;
      cursor: pointer; transition: all .2s; text-transform: uppercase; letter-spacing: .5px;
    }
    .cat-btn:hover, .cat-btn.active { background: var(--yellow); border-color: var(--yellow); color: var(--black); }

    /* GRID */
    .container { max-width: 1200px; margin: 0 auto; padding: 3rem 2rem; }
    .posts-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 2rem; }

    /* CARD */
    .post-card {
      background: var(--white); border: 1.5px solid var(--border);
      transition: transform .2s, border-color .2s; cursor: pointer; text-decoration: none; display: block; color: inherit;
    }
    .post-card:hover { transform: translateY(-4px); border-color: var(--yellow); }
    .card-img {
      width: 100%; height: 200px; object-fit: cover; display: block;
      background: var(--black);
    }
    .card-img-placeholder {
      width: 100%; height: 200px; background: var(--black);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Bebas Neue', sans-serif; font-size: 3rem; color: var(--yellow); letter-spacing: 3px;
    }
    .card-body { padding: 1.5rem; }
    .card-meta { display: flex; align-items: center; gap: 1rem; margin-bottom: .75rem; }
    .card-category {
      background: var(--yellow); color: var(--black);
      font-size: 10px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; padding: 3px 10px;
    }
    .card-date { font-size: 12px; color: var(--text-muted); }
    .card-title { font-family: 'Bebas Neue', sans-serif; font-size: 1.6rem; line-height: 1.1; margin-bottom: .75rem; letter-spacing: .5px; }
    .card-excerpt { font-size: 14px; color: var(--text-muted); line-height: 1.6; }
    .card-read { display: inline-flex; align-items: center; gap: 6px; margin-top: 1rem; font-size: 13px; font-weight: 700; color: var(--black); text-transform: uppercase; letter-spacing: 1px; }
    .card-read::after { content: '→'; transition: transform .2s; }
    .post-card:hover .card-read::after { transform: translateX(4px); }

    /* FEATURED */
    .featured-card {
      grid-column: 1 / -1; display: grid; grid-template-columns: 1fr 1fr;
      border: 1.5px solid var(--border); background: var(--black); color: var(--white);
      text-decoration: none; cursor: pointer; transition: border-color .2s;
    }
    .featured-card:hover { border-color: var(--yellow); }
    .featured-img {
      height: 360px; object-fit: cover; background: #1a1a1a;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Bebas Neue', sans-serif; font-size: 5rem; color: var(--yellow);
    }
    .featured-img img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .featured-body { padding: 3rem; display: flex; flex-direction: column; justify-content: center; }
    .featured-label { background: var(--yellow); color: var(--black); font-size: 10px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; padding: 3px 10px; display: inline-block; margin-bottom: 1rem; width: fit-content; }
    .featured-title { font-family: 'Bebas Neue', sans-serif; font-size: 2.8rem; line-height: 1; letter-spacing: 1px; margin-bottom: 1rem; }
    .featured-excerpt { color: #aaa; line-height: 1.6; }
    .featured-read { margin-top: 2rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--yellow); }

    /* EMPTY */
    .empty-state { text-align: center; padding: 5rem 2rem; }
    .empty-state h2 { font-family: 'Bebas Neue', sans-serif; font-size: 2.5rem; margin-bottom: 1rem; }
    .empty-state p { color: var(--text-muted); }

    /* LOADER */
    .loader { text-align: center; padding: 4rem; }
    .spinner { width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--yellow); border-radius: 50%; animation: spin .7s linear infinite; margin: 0 auto 1rem; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* FOOTER */
    footer { background: var(--black); color: #666; text-align: center; padding: 2rem; font-size: 13px; border-top: 3px solid var(--yellow); }
    footer span { color: var(--yellow); }

    @media (max-width: 768px) {
      .featured-card { grid-template-columns: 1fr; }
      .featured-img { height: 220px; }
      .hero h1 { font-size: 3.5rem; }
    }
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">
    <img src="https://raw.githubusercontent.com/a2kfsuplementos/blog-a2kf/main/logo.png" alt="A2KF Suplementos" style="height:120px;width:auto;display:block;" />
  </a>
  <div class="nav-links">
    <a href="index.html">Blog</a>
    <a href="https://a2kfsuplementos.com.br" id="lojaLink">Loja</a>
    <a href="admin/login.html" class="nav-admin-btn">Admin</a>
  </div>
</nav>

<section class="hero">
  <div class="hero-label">Blog Oficial</div>
  <h1>TREINO.<br/><span>NUTRIÇÃO.</span><br/>RESULTADOS.</h1>
  <p>Conteúdo especializado em suplementação, treino e alimentação para quem leva o físico a sério.</p>
</section>

<div class="search-bar">
  <input type="text" id="searchInput" placeholder="Buscar artigos..." />
</div>

<div class="categories" id="categoriesBar">
  <button class="cat-btn active" data-cat="">Todos</button>
</div>

<div class="container">
  <div id="postsGrid" class="posts-grid">
    <div class="loader"><div class="spinner"></div><p>Carregando artigos...</p></div>
  </div>
</div>

<footer>
  <p>© 2026 <span>A2KF Suplementos</span> · Todos os direitos reservados</p>
</footer>

<!-- POST MODAL -->
<div id="postModal" style="display:none; position:fixed; inset:0; z-index:999; background:rgba(0,0,0,.85); overflow-y:auto;">
  <div style="max-width:800px; margin:4rem auto; background:var(--white); padding:0; position:relative;">
    <button onclick="closeModal()" style="position:absolute; top:1rem; right:1rem; z-index:10; background:var(--yellow); border:none; width:36px; height:36px; font-size:18px; cursor:pointer; font-weight:700;">✕</button>
    <div id="modalContent"></div>
  </div>
</div>

<script>
  // =============================================
  // CONFIGURAÇÃO SUPABASE — SUBSTITUA ESTES VALORES
  // =============================================
  const SUPABASE_URL = 'https://lotyhojoixtqgxnqllac.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxvdHlob2pvaXh0cWd4bnFsbGFjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkyMzE0MzMsImV4cCI6MjA5NDgwNzQzM30.JerocygTqXc_hQOB1YBhWIC6aUd95GQO9uH5sC-U0_g';
  // =============================================

  const _sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  let allPosts = [];
  let activeCategory = '';
  let searchQuery = '';

  const CATEGORIES = ['Suplementação', 'Treino', 'Nutrição', 'Saúde', 'Receitas', 'Dicas'];

  function buildCategories() {
    const bar = document.getElementById('categoriesBar');
    bar.innerHTML = '<button class="cat-btn active" data-cat="" onclick="filterCat(this, \'\')">Todos</button>';
    CATEGORIES.forEach(c => {
      const btn = document.createElement('button');
      btn.className = 'cat-btn';
      btn.dataset.cat = c;
      btn.textContent = c;
      btn.onclick = () => filterCat(btn, c);
      bar.appendChild(btn);
    });
  }

  function filterCat(btn, cat) {
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeCategory = cat;
    renderPosts();
  }

  document.getElementById('searchInput').addEventListener('input', e => {
    searchQuery = e.target.value.toLowerCase();
    renderPosts();
  });

  function formatDate(d) {
    return new Date(d).toLocaleDateString('pt-BR', { day: '2-digit', month: 'short', year: 'numeric' });
  }

  function renderPosts() {
    let posts = allPosts.filter(p => p.published);
    if (activeCategory) posts = posts.filter(p => p.category === activeCategory);
    if (searchQuery) posts = posts.filter(p =>
      p.title.toLowerCase().includes(searchQuery) ||
      (p.excerpt || '').toLowerCase().includes(searchQuery)
    );

    const grid = document.getElementById('postsGrid');
    if (!posts.length) {
      grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1"><h2>NENHUM ARTIGO ENCONTRADO</h2><p>Tente outro termo ou categoria.</p></div>';
      return;
    }

    grid.innerHTML = '';
    posts.forEach((post, i) => {
      if (i === 0) {
        grid.insertAdjacentHTML('beforeend', featuredCardHTML(post));
      } else {
        grid.insertAdjacentHTML('beforeend', cardHTML(post));
      }
    });
  }

  function featuredCardHTML(p) {
    const img = p.cover_url
      ? `<img src="${p.cover_url}" alt="${p.title}" style="width:100%;height:100%;object-fit:cover;display:block;" />`
      : `<div style="height:360px;background:#111;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:5rem;color:#FFD400;">A2KF</div>`;
    return `
      <div class="featured-card" onclick="openPost('${p.id}')">
        <div class="featured-img">${img}</div>
        <div class="featured-body">
          <span class="featured-label">${p.category || 'Destaque'}</span>
          <h2 class="featured-title">${p.title}</h2>
          <p class="featured-excerpt">${p.excerpt || ''}</p>
          <p class="featured-read">Ler artigo →</p>
        </div>
      </div>`;
  }

  function cardHTML(p) {
    const img = p.cover_url
      ? `<img src="${p.cover_url}" class="card-img" alt="${p.title}" />`
      : `<div class="card-img-placeholder">A2KF</div>`;
    return `
      <div class="post-card" onclick="openPost('${p.id}')">
        ${img}
        <div class="card-body">
          <div class="card-meta">
            <span class="card-category">${p.category || 'Geral'}</span>
            <span class="card-date">${formatDate(p.created_at)}</span>
          </div>
          <h2 class="card-title">${p.title}</h2>
          <p class="card-excerpt">${p.excerpt || ''}</p>
          <span class="card-read">Ler artigo</span>
        </div>
      </div>`;
  }

  async function openPost(id) {
    const post = allPosts.find(p => p.id === id);
    if (!post) return;
    document.getElementById('modalContent').innerHTML = `
      ${post.cover_url ? `<img src="${post.cover_url}" style="width:100%;max-height:380px;object-fit:cover;display:block;" />` : ''}
      <div style="padding:2.5rem;">
        <div style="display:flex;gap:1rem;align-items:center;margin-bottom:1rem;">
          <span style="background:#FFD400;color:#000;font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;padding:3px 10px;">${post.category || 'Geral'}</span>
          <span style="font-size:12px;color:#666;">${formatDate(post.created_at)}</span>
        </div>
        <h1 style="font-family:'Bebas Neue',sans-serif;font-size:2.8rem;line-height:1;letter-spacing:1px;margin-bottom:1.5rem;">${post.title}</h1>
        <div style="font-size:16px;line-height:1.8;color:#333;">${post.content || ''}</div>
      </div>`;
    document.getElementById('postModal').style.display = 'block';
    document.body.style.overflow = 'hidden';
  }

  function closeModal() {
    document.getElementById('postModal').style.display = 'none';
    document.body.style.overflow = '';
  }
  document.getElementById('postModal').addEventListener('click', e => {
    if (e.target === document.getElementById('postModal')) closeModal();
  });

  async function loadPosts() {
    const { data, error } = await _sb
      .from('posts')
      .select('*')
      .order('created_at', { ascending: false });

    const grid = document.getElementById('postsGrid');
    if (error) {
      grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1">
        <h2>CONFIGURE O SUPABASE</h2>
        <p>Edite <strong>SUPABASE_URL</strong> e <strong>SUPABASE_ANON_KEY</strong> no arquivo index.html para conectar ao banco de dados.</p>
      </div>`;
      return;
    }
    allPosts = data || [];
    buildCategories();
    renderPosts();
  }

  loadPosts();
</script>
</body>
</html>
