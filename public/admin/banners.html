<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Banners – A2KF Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root { --yellow:#FFD400; --black:#0A0A0A; --white:#fff; --gray:#F4F4F2; --border:#E5E5E0; --muted:#6B6B6B; --red:#E53E3E; --green:#38A169; }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'DM Sans',sans-serif; background:#f7f7f5; color:var(--black); display:flex; min-height:100vh; }

    .sidebar { width:240px; background:var(--black); display:flex; flex-direction:column; position:fixed; top:0; left:0; height:100vh; z-index:50; }
    .sidebar-logo { padding:1.5rem; border-bottom:2px solid #222; display:flex; align-items:center; gap:10px; }
    .sidebar-logo-badge { background:var(--yellow); color:var(--black); font-family:'Bebas Neue',sans-serif; font-size:20px; padding:2px 10px; }
    .sidebar-logo-text { color:#fff; font-size:12px; font-weight:500; letter-spacing:2px; text-transform:uppercase; }
    .sidebar-nav { flex:1; padding:1rem 0; }
    .sidebar-nav a { display:flex; align-items:center; gap:12px; padding:.85rem 1.5rem; color:#888; text-decoration:none; font-size:14px; font-weight:500; transition:all .2s; }
    .sidebar-nav a:hover, .sidebar-nav a.active { color:#fff; background:#1a1a1a; border-left:3px solid var(--yellow); }
    .sidebar-nav a svg { width:18px; height:18px; flex-shrink:0; }
    .sidebar-footer { padding:1.5rem; border-top:1px solid #222; }
    .sidebar-footer button { width:100%; padding:10px; background:transparent; border:1px solid #333; color:#888; font-family:'DM Sans',sans-serif; font-size:13px; cursor:pointer; transition:all .2s; }
    .sidebar-footer button:hover { border-color:var(--red); color:var(--red); }

    .main { margin-left:240px; flex:1; padding:2rem; min-width:0; }
    .topbar { display:flex; align-items:center; justify-content:space-between; margin-bottom:2rem; flex-wrap:wrap; gap:.75rem; }
    .topbar h1 { font-family:'Bebas Neue',sans-serif; font-size:2rem; letter-spacing:1px; }

    .btn { padding:10px 24px; border:none; font-family:'DM Sans',sans-serif; font-weight:700; font-size:13px; letter-spacing:1px; text-transform:uppercase; cursor:pointer; transition:all .2s; display:inline-flex; align-items:center; gap:8px; }
    .btn-primary { background:var(--yellow); color:var(--black); }
    .btn-primary:hover { opacity:.9; }
    .btn-danger { background:transparent; color:var(--red); border:1px solid var(--red); padding:6px 14px; font-size:12px; }
    .btn-danger:hover { background:var(--red); color:#fff; }
    .btn-toggle { background:transparent; color:#555; border:1px solid var(--border); padding:6px 14px; font-size:12px; }
    .btn-toggle:hover { border-color:#555; }
    .btn-edit { background:var(--black); color:#fff; padding:6px 14px; font-size:12px; }
    .btn-edit:hover { opacity:.7; }

    /* FORM */
    .form-card { background:var(--white); border:1.5px solid var(--border); padding:1.75rem; margin-bottom:2rem; }
    .form-card h2 { font-size:14px; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:var(--muted); margin-bottom:1.25rem; }
    .form-grid { display:grid; grid-template-columns:1fr 1fr; gap:1rem; }
    .form-field { margin-bottom:1rem; }
    .form-field.full { grid-column:1/-1; }
    label { display:block; font-size:11px; font-weight:700; letter-spacing:1px; text-transform:uppercase; color:var(--muted); margin-bottom:.5rem; }
    input[type="text"], input[type="url"], input[type="number"] {
      width:100%; padding:10px 14px; border:1.5px solid var(--border);
      font-family:'DM Sans',sans-serif; font-size:14px; outline:none; transition:border-color .2s;
    }
    input:focus { border-color:var(--yellow); }

    /* PREVIEW */
    .preview-wrap { margin-top:1rem; display:none; }
    .preview-wrap.show { display:block; }
    .preview-img { width:100%; height:180px; object-fit:cover; border:1.5px solid var(--border); display:block; }
    .preview-placeholder { width:100%; height:180px; background:#111; border:1.5px solid var(--border); display:flex; align-items:center; justify-content:center; color:#333; font-family:'Bebas Neue',sans-serif; font-size:2rem; }

    /* LISTA */
    .banners-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(300px, 1fr)); gap:1.25rem; }
    .banner-card { background:var(--white); border:1.5px solid var(--border); overflow:hidden; transition:border-color .2s; }
    .banner-card.inactive { opacity:.55; }
    .banner-card-img { width:100%; height:160px; object-fit:cover; display:block; background:#111; }
    .banner-card-placeholder { width:100%; height:160px; background:#111; display:flex; align-items:center; justify-content:center; font-family:'Bebas Neue',sans-serif; font-size:2.5rem; color:#333; }
    .banner-card-body { padding:1rem; }
    .banner-card-title { font-weight:700; font-size:15px; margin-bottom:.25rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .banner-card-sub { font-size:13px; color:var(--muted); margin-bottom:.75rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .banner-card-status { display:inline-block; padding:2px 8px; font-size:10px; font-weight:700; letter-spacing:1px; text-transform:uppercase; margin-bottom:.75rem; }
    .banner-card-status.active { background:#e6f7ee; color:#256341; }
    .banner-card-status.inactive { background:#f5f5f5; color:#888; }
    .banner-card-actions { display:flex; gap:.5rem; flex-wrap:wrap; }

    /* EMPTY */
    .empty { text-align:center; padding:3rem; color:var(--muted); }
    .empty h3 { font-family:'Bebas Neue',sans-serif; font-size:1.6rem; margin-bottom:.5rem; }

    /* LOADER */
    .loader { text-align:center; padding:3rem; color:var(--muted); }
    .spinner { width:32px; height:32px; border:3px solid var(--border); border-top-color:var(--yellow); border-radius:50%; animation:spin .7s linear infinite; margin:0 auto .75rem; }
    @keyframes spin { to { transform:rotate(360deg); } }

    /* TOAST */
    .toast { position:fixed; bottom:2rem; right:2rem; background:var(--black); color:#fff; padding:12px 24px; font-size:14px; font-weight:500; z-index:999; transform:translateY(100px); opacity:0; transition:all .3s; }
    .toast.show { transform:translateY(0); opacity:1; }
    .toast.success { border-left:4px solid var(--green); }
    .toast.error { border-left:4px solid var(--red); }

    @media(max-width:900px) {
      .sidebar { display:none; }
      .main { margin-left:0; padding:1.25rem; }
      .form-grid { grid-template-columns:1fr; }
    }
    @media(max-width:480px) {
      .banners-grid { grid-template-columns:1fr; }
    }
  </style>
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-logo">
    <span class="sidebar-logo-badge">A2KF</span>
    <span class="sidebar-logo-text">Admin</span>
  </div>
  <nav class="sidebar-nav">
    <a href="dashboard.html">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
      Dashboard
    </a>
    <a href="editor.html">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4 12.5-12.5z"/></svg>
      Novo Post
    </a>
    <a href="banners.html" class="active">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 3h-8"/><path d="M12 3v4"/></svg>
      Banners
    </a>
    <a href="scheduled.html">
  <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
    <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
  </svg>
  Agendados
</a>
    <a href="analytics.html">
  <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
  Analytics
</a>
    <a href="../index.html" target="_blank">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
      Ver Blog
    </a>
  </nav>
  <div class="sidebar-footer">
    <button onclick="logout()">Sair da conta</button>
  </div>
</aside>

<main class="main">
  <div class="topbar">
    <h1>BANNERS</h1>
  </div>

  <!-- FORMULÁRIO -->
  <div class="form-card">
    <h2 id="formTitle">Novo Banner</h2>
    <input type="hidden" id="bannerId" />
    <div class="form-grid">
      <div class="form-field">
        <label>Título *</label>
        <input type="text" id="bannerTitle" placeholder="Ex: Whey Protein Isolado" />
      </div>
      <div class="form-field">
        <label>Subtítulo</label>
        <input type="text" id="bannerSubtitle" placeholder="Ex: O melhor para ganho muscular" />
      </div>
      <div class="form-field full">
        <label>URL da Imagem *</label>
        <input type="url" id="bannerImage" placeholder="https://..." oninput="previewBanner()" />
        <div class="preview-wrap" id="previewWrap">
          <img id="previewImg" class="preview-img" src="" alt="Preview" onerror="this.style.display='none'" style="margin-top:.75rem;" />
        </div>
      </div>
      <div class="form-field">
        <label>Link (URL da loja) *</label>
        <input type="url" id="bannerLink" placeholder="https://a2kfsuplementos.com.br/produto/..." />
      </div>
      <div class="form-field">
        <label>Ordem (menor = primeiro)</label>
        <input type="number" id="bannerOrdem" value="0" min="0" />
      </div>
    </div>
    <div style="display:flex;gap:.75rem;flex-wrap:wrap;">
      <button class="btn btn-primary" onclick="saveBanner()">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        <span id="saveBtnText">Adicionar Banner</span>
      </button>
      <button class="btn btn-toggle" id="cancelEditBtn" onclick="cancelEdit()" style="display:none;">Cancelar</button>
    </div>
  </div>

  <!-- LISTA -->
  <div id="bannersGrid" class="banners-grid">
    <div class="loader"><div class="spinner"></div><p>Carregando banners...</p></div>
  </div>
</main>

<div class="toast" id="toast"></div>

<script>
  const SUPABASE_URL = 'https://cducpjclmtzktncqhjoa.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNkdWNwamNsbXR6a3RuY3Foam9hIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkzMDY4OTEsImV4cCI6MjA5NDg4Mjg5MX0.ReDmQFqXEWzOKW2akPrOnLMuf7wBo4ZY5Oh_8ocfZZg';
  const _sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  _sb.auth.getSession().then(({ data: { session } }) => {
    if (!session) window.location.href = 'login.html';
    else loadBanners();
  });

  async function logout() {
    await _sb.auth.signOut();
    window.location.href = 'login.html';
  }

  async function loadBanners() {
    const { data, error } = await _sb.from('banners').select('*').order('ordem').order('created_at', { ascending: false });
    const grid = document.getElementById('bannersGrid');
    if (error) { showToast('Erro ao carregar banners.', 'error'); grid.innerHTML = ''; return; }
    if (!data || !data.length) {
      grid.innerHTML = '<div class="empty"><h3>NENHUM BANNER</h3><p>Adicione seu primeiro banner acima.</p></div>';
      return;
    }
    grid.innerHTML = data.map(b => `
      <div class="banner-card ${b.active ? '' : 'inactive'}" id="card-${b.id}">
        ${b.image_url
          ? `<img src="${b.image_url}" class="banner-card-img" alt="${b.title}" loading="lazy" onerror="this.outerHTML='<div class=banner-card-placeholder>A2KF</div>'" />`
          : `<div class="banner-card-placeholder">A2KF</div>`}
        <div class="banner-card-body">
          <div class="banner-card-title">${b.title}</div>
          ${b.subtitle ? `<div class="banner-card-sub">${b.subtitle}</div>` : ''}
          <span class="banner-card-status ${b.active ? 'active' : 'inactive'}">${b.active ? 'Ativo' : 'Inativo'}</span>
          <div class="banner-card-actions">
            <button class="btn btn-edit" onclick="editBanner('${b.id}')">Editar</button>
            <button class="btn btn-toggle" onclick="toggleBanner('${b.id}', ${b.active})">${b.active ? 'Desativar' : 'Ativar'}</button>
            <button class="btn btn-danger" onclick="deleteBanner('${b.id}')">Excluir</button>
          </div>
        </div>
      </div>
    `).join('');
  }

  function previewBanner() {
    const url = document.getElementById('bannerImage').value.trim();
    const wrap = document.getElementById('previewWrap');
    const img = document.getElementById('previewImg');
    if (url) {
      img.src = url;
      img.style.display = 'block';
      wrap.classList.add('show');
    } else {
      wrap.classList.remove('show');
    }
  }

  async function saveBanner() {
    const id = document.getElementById('bannerId').value;
    const title = document.getElementById('bannerTitle').value.trim();
    const subtitle = document.getElementById('bannerSubtitle').value.trim();
    const image_url = document.getElementById('bannerImage').value.trim();
    const link = document.getElementById('bannerLink').value.trim();
    const ordem = parseInt(document.getElementById('bannerOrdem').value) || 0;

    if (!title || !image_url || !link) {
      showToast('Preencha título, imagem e link.', 'error'); return;
    }

    const payload = { title, subtitle: subtitle || null, image_url, link, ordem };

    if (id) {
      const { error } = await _sb.from('banners').update(payload).eq('id', id);
      if (error) { showToast('Erro ao atualizar.', 'error'); return; }
      showToast('Banner atualizado!', 'success');
      cancelEdit();
    } else {
      const { error } = await _sb.from('banners').insert([{ ...payload, active: true }]);
      if (error) { showToast('Erro ao salvar.', 'error'); return; }
      showToast('Banner adicionado!', 'success');
      clearForm();
    }
    loadBanners();
  }

  async function toggleBanner(id, current) {
    const { error } = await _sb.from('banners').update({ active: !current }).eq('id', id);
    if (error) { showToast('Erro ao atualizar.', 'error'); return; }
    showToast(current ? 'Banner desativado.' : 'Banner ativado!', 'success');
    loadBanners();
  }

  async function deleteBanner(id) {
    if (!confirm('Excluir este banner?')) return;
    const { error } = await _sb.from('banners').delete().eq('id', id);
    if (error) { showToast('Erro ao excluir.', 'error'); return; }
    showToast('Banner excluído.', 'success');
    loadBanners();
  }

  let editingData = null;
  async function editBanner(id) {
    const { data, error } = await _sb.from('banners').select('*').eq('id', id).single();
    if (error || !data) return;
    editingData = data;
    document.getElementById('bannerId').value = data.id;
    document.getElementById('bannerTitle').value = data.title || '';
    document.getElementById('bannerSubtitle').value = data.subtitle || '';
    document.getElementById('bannerImage').value = data.image_url || '';
    document.getElementById('bannerLink').value = data.link || '';
    document.getElementById('bannerOrdem').value = data.ordem || 0;
    document.getElementById('formTitle').textContent = 'Editar Banner';
    document.getElementById('saveBtnText').textContent = 'Salvar Alterações';
    document.getElementById('cancelEditBtn').style.display = 'inline-flex';
    previewBanner();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function cancelEdit() {
    editingData = null;
    clearForm();
    document.getElementById('formTitle').textContent = 'Novo Banner';
    document.getElementById('saveBtnText').textContent = 'Adicionar Banner';
    document.getElementById('cancelEditBtn').style.display = 'none';
  }

  function clearForm() {
    document.getElementById('bannerId').value = '';
    document.getElementById('bannerTitle').value = '';
    document.getElementById('bannerSubtitle').value = '';
    document.getElementById('bannerImage').value = '';
    document.getElementById('bannerLink').value = '';
    document.getElementById('bannerOrdem').value = '0';
    document.getElementById('previewWrap').classList.remove('show');
  }

  function showToast(msg, type = 'success') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = `toast ${type} show`;
    setTimeout(() => t.className = 'toast', 3000);
  }
</script>
</body>
</html>
